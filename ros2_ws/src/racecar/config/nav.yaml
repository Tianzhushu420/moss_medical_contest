# 适用于OriginCar阿克曼底盘的完整Navigation2配置 (防切内角与AEB极限版)
# ROS 2 Foxy/Humble版本

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.4
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 5.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom_combined"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.02
    tf_broadcast: true
    transform_tolerance: 0.3
    update_min_a: 0.2
    update_min_d: 0.2
    z_hit: 0.7
    z_rand: 0.059
    z_short: 0.24
    scan_topic: /scan
    set_initial_pose: true
    initial_pose.x: 0.0
    initial_pose.y: 0.0
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    transform_tolerance: 0.1
    goal_reached_tol: 0.4
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: odom_combined
    bt_loop_duration: 50
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.0
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.0
    odom_topic: odom_combined
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"

      odom_topic: odom_combined
      map_frame: map

      teb_autosize: true
      dt_ref: 0.3
      dt_hysteresis: 0.1
      global_plan_overwrite_orientation: true
      max_global_plan_lookahead_dist: 3.0
      feasibility_check_no_poses: 5

      max_vel_x: 0.8
      max_vel_x_backwards: 0.2
      max_vel_y: 0.0
      max_vel_theta: 1.0
      acc_lim_x: 0.8
      acc_lim_y: 0.0
      acc_lim_theta: 1.0

      min_turning_radius: 0.3
      wheelbase: 0.3
      cmd_angle_instead_rotvel: false

      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      free_goal_vel: false
      complete_global_plan: true

      min_obstacle_dist: 0.15
      inflation_dist: 0.3
      include_costmap_obstacles: true
      costmap_obstacles_behind_robot_dist: 1.0
      obstacle_poses_affected: 15
      include_dynamic_obstacles: false
      dynamic_obstacle_inflation_dist: 0.6

      no_inner_iterations: 5
      no_outer_iterations: 4
      optimization_activate: true
      optimization_verbose: false
      penalty_epsilon: 0.1
      weight_max_vel_x: 2.0
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 1.0
      weight_acc_lim_theta: 1.0
      weight_kinematics_nh: 1000.0
      weight_kinematics_forward_drive: 1000.0
      weight_kinematics_turning_radius: 1.0
      weight_optimaltime: 1.0
      weight_obstacle: 50.0
      weight_inflation: 0.1

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom_combined
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      robot_radius: 0.15
      footprint: "[ [-0.15, -0.10], [-0.15, 0.10], [0.25, 0.10], [0.25, -0.10] ]"
      plugins: ["voxel_layer", "inflation_layer"]

      # 局部代价地图：负责实时避障
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.2
        cost_scaling_factor: 3.5  # 降低衰减，扩大中等代价区，把路径往外推

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.01
      always_send_full_costmap: false

  local_costmap_client:
    ros__parameters:
      use_sim_time: false

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: false
      resolution: 0.05
      robot_radius: 0.15
      footprint: "[ [-0.15, -0.10], [-0.15, 0.10], [0.25, 0.10], [0.25, -0.10] ]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"] 

      # 全局代价地图：负责路径规划
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.15
        cost_scaling_factor: 3.5  # 同样降低衰减，防止绿线贴墙

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1

      always_send_full_costmap: true

  global_costmap_client:
    ros__parameters:
      use_sim_time: false

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: false
    expected_planner_frequency: 1.0

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 1.0
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.0
      motion_model_for_search: "REEDS_SHEPP"
      cost_travel_multiplier: 2.0
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.6
      reverse_penalty: 15.0
      change_penalty: 10.0       # 提高变道惩罚，防止路径左右乱跳
      non_straight_penalty: 5.0
      cost_penalty: 25.0         # 提高对障碍物的恐惧感，让绿线主动绕远
      cache_obstacle_heuristic: true
      max_steer_angle: 0.5236
      wheelbase: 0.3
      turn_radius: 1.2
      is_reverse_cost: true
      is_holonomic_cost: false
      is_collision_checking_cost: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 20.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

    global_frame: odom_combined
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 5.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.0
    rotational_acc_lim: 0.3

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: false
